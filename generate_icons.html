<!-- Utility: open this file in a browser, right-click each canvas, and "Save image as" -->
<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body style="background:#1a1a2e; padding:20px; font-family:sans-serif; color:#fff;">
<h2>Right-click each icon → Save image as → icons/iconNN.png</h2>
<div id="icons" style="display:flex;gap:20px;flex-wrap:wrap;align-items:end;"></div>
<script>
const sizes = [16, 32, 48, 128];
const container = document.getElementById('icons');

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background — rounded red gradient
  const r = size * 0.2;
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#ff4e50');
  grad.addColorStop(1, '#c62828');

  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Arrow symbol "⇄" drawn manually
  ctx.strokeStyle = '#fff';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = Math.max(1.5, size * 0.08);

  const cx = size / 2;
  const cy = size / 2;
  const arm = size * 0.25;
  const arrowHead = size * 0.1;

  // Top arrow →
  const topY = cy - size * 0.12;
  ctx.beginPath();
  ctx.moveTo(cx - arm, topY);
  ctx.lineTo(cx + arm, topY);
  ctx.moveTo(cx + arm - arrowHead, topY - arrowHead);
  ctx.lineTo(cx + arm, topY);
  ctx.lineTo(cx + arm - arrowHead, topY + arrowHead);
  ctx.stroke();

  // Bottom arrow ←
  const botY = cy + size * 0.12;
  ctx.beginPath();
  ctx.moveTo(cx + arm, botY);
  ctx.lineTo(cx - arm, botY);
  ctx.moveTo(cx - arm + arrowHead, botY - arrowHead);
  ctx.lineTo(cx - arm, botY);
  ctx.lineTo(cx - arm + arrowHead, botY + arrowHead);
  ctx.stroke();

  // Trailing dot
  const dotR = Math.max(1, size * 0.05);
  ctx.beginPath();
  ctx.arc(cx + arm + size*0.08, cy, dotR, 0, Math.PI*2);
  ctx.fillStyle = '#34d399';
  ctx.fill();

  // Label
  const wrapper = document.createElement('div');
  wrapper.style.textAlign = 'center';
  const label = document.createElement('p');
  label.textContent = `${size}×${size}`;
  label.style.margin = '6px 0 0';
  label.style.fontSize = '12px';
  wrapper.appendChild(canvas);
  wrapper.appendChild(label);
  container.appendChild(wrapper);
});
</script>
</body>
</html>
