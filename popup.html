<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Ad Shield</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
</head>
<body>

  <div class="container" id="app">

    <!-- ── Header ─────────────────────────────────────────────── -->
    <header class="header">
      <div class="header__logo">
        <div class="header__icon" aria-hidden="true">🛡️</div>
        <h1 class="header__title">Ad Shield</h1>
      </div>
    </header>

    <!-- ── Single ON/OFF Toggle ────────────────────────────────── -->
    <div class="card toggle-card">
      <div class="toggle-section">
        <div class="toggle-section__label">
          <span class="status__text" id="status-text">Loading…</span>
        </div>
        <label class="toggle" for="toggle-enabled">
          <input
            type="checkbox"
            id="toggle-enabled"
            class="toggle__input"
            aria-label="Enable or disable ad blocking"
          />
          <span class="toggle__slider"></span>
        </label>
      </div>
    </div>

    <!-- ── Stats Card ─────────────────────────────────────────── -->
    <div class="card stats-counter">
      <span class="stats-counter__number" id="stats-count">0</span>
      <span class="stats-counter__label">Ads Blocked</span>
    </div>

    <!-- ── Footer ─────────────────────────────────────────────── -->
    <footer class="footer">
      <p class="footer__text">
        v<span class="footer__version" id="version-number">3.0.0</span>
      </p>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
